<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ripristino — pezzaliAPP Remote Assist</title>
<style>
  html,body{height:100%}
  body{margin:0;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#eaf1ff;
    background:radial-gradient(1200px 600px at 50% -20%,#172042,#0b1022);
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:480px;width:100%;background:linear-gradient(180deg,#0f183a,#0c1431);
    border:1px solid #223082;border-radius:14px;padding:22px;box-shadow:0 16px 48px rgba(0,0,0,.5)}
  h1{font-size:18px;margin:0 0 10px}
  p{margin:8px 0;color:#c3d3f5}
  #s{font-weight:600;color:#2dd4bf}
  a.btn{display:inline-block;margin-top:14px;background:#2dd4bf;color:#06231f;font-weight:600;
    text-decoration:none;padding:12px 16px;border-radius:10px}
</style>
</head>
<body>
  <div class="card">
    <h1>Ripristino pezzaliAPP Remote Assist</h1>
    <p>Sto rimuovendo la vecchia cache e il service worker che impedivano gli aggiornamenti.</p>
    <p id="s">Pulizia in corso…</p>
    <a class="btn" id="manual" href="index.html" hidden>Apri l’app aggiornata</a>
  </div>
<script>
(async () => {
  const s = document.getElementById('s');
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    s.textContent = 'Fatto. Riapro l’app aggiornata…';
  } catch (e) {
    s.textContent = 'Pulizia non riuscita: ' + (e && e.message ? e.message : e);
  }
  // Mostra anche un bottone manuale, nel caso il redirect automatico sia bloccato.
  document.getElementById('manual').hidden = false;
  // Redirect con cache-busting: l'app si ricarica fresca, senza service worker attivo.
  setTimeout(() => location.replace('index.html?fresh=' + Date.now()), 900);
})();
</script>
</body>
</html>
